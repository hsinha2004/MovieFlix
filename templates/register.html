<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieFlix — Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #e63946;
            --primary-hover: #ff4d5a;
            --primary-glow: rgba(230, 57, 70, 0.25);
            --accent: #f4a261;
            --background: #0b0b14;
            --surface: #14142b;
            --surface-elevated: #1c1c3a;
            --surface-glass: rgba(28, 28, 58, 0.8);
            --text-primary: #f0f0f5;
            --text-secondary: #a0a0bc;
            --text-muted: #6b6b85;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 22px;
            --radius-xl: 32px;
            --shadow-glow: 0 0 30px var(--primary-glow);
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
            --transition-fast: 0.2s var(--ease-out);
            --transition-smooth: 0.4s var(--ease-out);
        }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0; padding: 0;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: var(--background);
            position: relative;
        }
        h1,h2,h3 { font-family: 'Poppins', sans-serif; font-weight: 700; margin: 0; }

        .bg-layer {
            position: fixed; inset: 0; z-index: 0;
            background: url('/static/landing_bg.png') no-repeat center center/cover;
            filter: brightness(0.25) saturate(0.5);
        }
        .bg-gradient {
            position: fixed; inset: 0; z-index: 1;
            background: radial-gradient(ellipse at center, rgba(11,11,20,0.5) 0%, var(--background) 75%);
        }

        .header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 10;
            padding: 20px 50px;
        }
        .logo {
            font-family: 'Poppins', sans-serif; font-size: 1.8rem; font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-decoration: none; letter-spacing: -0.03em;
        }

        .auth-container {
            position: relative; z-index: 10;
            background: var(--surface-glass);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-subtle);
            padding: 48px 44px 36px;
            border-radius: var(--radius-md);
            width: 100%; max-width: 380px;
            animation: fadeIn 0.6s var(--ease-out);
        }
        .auth-container h2 {
            font-size: 1.75rem; margin-bottom: 8px;
        }
        .auth-subtitle {
            color: var(--text-muted); font-size: 0.9rem; margin-bottom: 28px;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block; font-size: 0.8rem; font-weight: 500;
            color: var(--text-secondary); margin-bottom: 6px;
        }
        .form-group input {
            width: 100%; padding: 12px 16px;
            border: 1px solid var(--border-subtle); border-radius: var(--radius-sm);
            background: var(--surface); color: var(--text-primary);
            font-size: 0.95rem; outline: none;
            transition: var(--transition-fast);
        }
        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
            background: var(--surface-elevated);
        }
        .form-group input::placeholder { color: var(--text-muted); }

        .btn-submit {
            width: 100%; padding: 13px;
            background: linear-gradient(135deg, var(--primary), #d62839);
            color: var(--text-primary); border: none; border-radius: var(--radius-sm);
            font-size: 1rem; font-weight: 700; cursor: pointer;
            margin-top: 20px; transition: var(--transition-fast);
            letter-spacing: 0.02em;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .flash-messages {
            background: rgba(230, 57, 70, 0.15); border: 1px solid var(--primary);
            padding: 10px 14px; border-radius: var(--radius-sm);
            margin-bottom: 20px; font-size: 0.85rem; color: var(--primary-hover);
        }

        .switch-auth {
            margin-top: 28px; text-align: center;
            color: var(--text-muted); font-size: 0.85rem;
        }
        .switch-auth a {
            color: var(--primary); text-decoration: none; font-weight: 600;
        }
        .switch-auth a:hover { text-decoration: underline; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .header { padding: 16px 20px; }
            .auth-container { margin: 0 16px; padding: 36px 28px 28px; }
        }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <div class="bg-gradient"></div>

    <div class="header">
        <a href="/" class="logo">MovieFlix</a>
    </div>

    <div class="auth-container">
        <h2>Create Account</h2>
        <p class="auth-subtitle">Join MovieFlix and get AI-powered movie picks.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                        <div>{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST" action="/register">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a password" required>
            </div>
            <button type="submit" class="btn-submit">Create Account</button>
        </form>
        <div class="switch-auth">
            Already have an account? <a href="/login">Sign in</a>
        </div>
    </div>
</body>
</html>
