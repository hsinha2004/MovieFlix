<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" fill="#f8f9fa" rx="10" ry="10"/>
  
  <!-- Title -->
  <text x="400" y="30" font-family="Arial" font-size="24" text-anchor="middle" font-weight="bold" fill="#333">MovieFlix System Architecture</text>
  
  <!-- User layer -->
  <rect x="50" y="70" width="700" height="80" fill="#e3f2fd" stroke="#2196f3" stroke-width="2" rx="5" ry="5"/>
  <text x="400" y="95" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold" fill="#1565c0">User Interface Layer</text>
  
  <rect x="100" y="110" width="120" height="30" fill="#bbdefb" stroke="#64b5f6" stroke-width="1" rx="3" ry="3"/>
  <text x="160" y="130" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">Home Page</text>
  
  <rect x="240" y="110" width="120" height="30" fill="#bbdefb" stroke="#64b5f6" stroke-width="1" rx="3" ry="3"/>
  <text x="300" y="130" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">Swipe Interface</text>
  
  <rect x="380" y="110" width="120" height="30" fill="#bbdefb" stroke="#64b5f6" stroke-width="1" rx="3" ry="3"/>
  <text x="440" y="130" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">Movie Details</text>
  
  <rect x="520" y="110" width="120" height="30" fill="#bbdefb" stroke="#64b5f6" stroke-width="1" rx="3" ry="3"/>
  <text x="580" y="130" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">Search Results</text>
  
  <!-- Application logic layer -->
  <rect x="50" y="170" width="700" height="140" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" rx="5" ry="5"/>
  <text x="400" y="195" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold" fill="#2e7d32">Application Logic Layer</text>
  
  <rect x="80" y="210" width="180" height="90" fill="#c8e6c9" stroke="#81c784" stroke-width="1" rx="3" ry="3"/>
  <text x="170" y="230" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold" fill="#333">Movie Data Management</text>
  <text x="170" y="250" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">• TMDB API Integration</text>
  <text x="170" y="270" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">• Data Caching</text>
  <text x="170" y="290" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">• Movie Metadata Processing</text>
  
  <rect x="280" y="210" width="240" height="90" fill="#c8e6c9" stroke="#81c784" stroke-width="1" rx="3" ry="3"/>
  <text x="400" y="230" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold" fill="#333">Recommendation Engine</text>
  <text x="400" y="250" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">• Q-Learning Algorithm</text>
  <text x="400" y="270" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">• User Preference Tracking</text>
  <text x="400" y="290" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">• Vector Similarity Calculations</text>
  
  <rect x="540" y="210" width="180" height="90" fill="#c8e6c9" stroke="#81c784" stroke-width="1" rx="3" ry="3"/>
  <text x="630" y="230" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold" fill="#333">User Interaction</text>
  <text x="630" y="250" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">• Feedback Processing</text>
  <text x="630" y="270" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">• Ratings Collection</text>
  <text x="630" y="290" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">• Search Functionality</text>
  
  <!-- Data storage layer -->
  <rect x="50" y="330" width="700" height="120" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5" ry="5"/>
  <text x="400" y="355" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold" fill="#ef6c00">Data Storage Layer</text>
  
  <rect x="100" y="375" width="280" height="60" fill="#ffe0b2" stroke="#ffb74d" stroke-width="1" rx="3" ry="3"/>
  <text x="240" y="395" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold" fill="#333">SQLite Database</text>
  <text x="240" y="415" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">User Preferences, Q-Table, Caches</text>
  
  <rect x="420" y="375" width="280" height="60" fill="#ffe0b2" stroke="#ffb74d" stroke-width="1" rx="3" ry="3"/>
  <text x="560" y="395" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold" fill="#333">External API</text>
  <text x="560" y="415" font-family="Arial" font-size="12" text-anchor="middle" fill="#333">TMDB (The Movie Database)</text>
  
  <!-- Connections -->
  <!-- User to Application -->
  <line x1="160" y1="140" x2="160" y2="210" stroke="#2196f3" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="300" y1="140" x2="300" y2="210" stroke="#2196f3" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="440" y1="140" x2="440" y2="210" stroke="#2196f3" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="580" y1="140" x2="580" y2="210" stroke="#2196f3" stroke-width="2" stroke-dasharray="5,3"/>
  
  <!-- Application to Data -->
  <line x1="170" y1="300" x2="240" y2="375" stroke="#4caf50" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="400" y1="300" x2="240" y2="375" stroke="#4caf50" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="630" y1="300" x2="240" y2="375" stroke="#4caf50" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="170" y1="300" x2="560" y2="375" stroke="#4caf50" stroke-width="2" stroke-dasharray="5,3"/>
  
  <!-- Legend -->
  <rect x="50" y="460" width="15" height="15" fill="#e3f2fd" stroke="#2196f3" stroke-width="2" rx="2" ry="2"/>
  <text x="75" y="472" font-family="Arial" font-size="12" fill="#333">User Interface</text>
  
  <rect x="180" y="460" width="15" height="15" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" rx="2" ry="2"/>
  <text x="205" y="472" font-family="Arial" font-size="12" fill="#333">Application Logic</text>
  
  <rect x="330" y="460" width="15" height="15" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="2" ry="2"/>
  <text x="355" y="472" font-family="Arial" font-size="12" fill="#333">Data Storage</text>
  
  <line x1="460" y1="467" x2="490" y2="467" stroke="#2196f3" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="515" y="472" font-family="Arial" font-size="12" fill="#333">Data Flow</text>
</svg>